services:
  # ========================
  # Node.js Application
  # ========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telehealth-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://mongo:27017/telehealth
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - telehealth-network
    volumes:
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================
  # MongoDB
  # ========================
  mongo:
    image: mongo:6
    container_name: telehealth-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=telehealth
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - telehealth-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ========================
  # Nginx Reverse Proxy
  # ========================
  nginx:
    image: nginx:alpine
    container_name: telehealth-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
      # Uncomment for SSL certificates:
      # - ./certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - telehealth-network

# ========================
# Volumes
# ========================
volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  app-logs:
    driver: local
  nginx-logs:
    driver: local

# ========================
# Networks
# ========================
networks:
  telehealth-network:
    driver: bridge
